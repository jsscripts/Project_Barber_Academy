<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Painel de Agendamentos</title>
  <link rel="stylesheet" href="/HTML/assets/css/admin.css">
</head>
<body>
  <h1>Painel de Agendamentos</h1>
  
  <form id="edit-form" style="display: none; margin-bottom: 20px; padding: 15px; border: 1px solid #ccc;">
    <h3>Editando Agendamento</h3>
    <input type="hidden" id="edit-id">
    
    <label for="edit-data">Data:</label>
    <input type="date" id="edit-data" required>
    
    <label for="edit-horario">Horário:</label>
    <input type="time" id="edit-horario" required>
    
    <button type="submit">Salvar Alterações</button>
    <button type="button" id="cancel-edit-btn">Cancelar</button>
  </form>

  <div id="admin-container">
    <p>Carregando agendamentos...</p>
  </div>

  <script>
    // --- REFERÊNCIAS AOS ELEMENTOS DO HTML ---
    const adminContainer = document.getElementById('admin-container');
    const editForm = document.getElementById('edit-form');

    // --- FUNÇÕES ---

    // Função principal para buscar e exibir os agendamentos
    function carregarAgendamentos() {
      fetch('/PHP/read.php') // O nome do seu arquivo é read.php
        .then(res => {
          if (!res.ok) {
            throw new Error(`Erro na rede: ${res.statusText}`);
          }
          return res.json();
        })
        .then(agendamentos => {
          if (!agendamentos || agendamentos.length === 0) {
            adminContainer.innerHTML = "<p>Nenhum agendamento encontrado.</p>";
            return;
          }

          // Monta a tabela HTML com os dados
          let tabelaHtml = `
            <table>
              <thead>
                <tr>
                  <th>Cliente</th>
                  <th>Serviço</th>
                  <th>Unidade</th>
                  <th>Data</th>
                  <th>Horário</th>
                  <th>Ações</th>
                </tr>
              </thead>
              <tbody>
          `;
          tabelaHtml += agendamentos.map(ag => `
            <tr id="agendamento-${ag.id}">
              <td>${ag.nome_usuario}</td>
              <td>${ag.nome_servico}</td>
              <td>${ag.local}</td>
              <td>${new Date(ag.data + 'T00:00:00').toLocaleDateString('pt-BR')}</td>
              <td>${ag.horario}</td>
              <td>
                <button class="edit-btn" data-id="${ag.id}" data-data="${ag.data}" data-horario="${ag.horario}">Editar</button>
                <button class="delete-btn" data-id="${ag.id}">Remover</button>
              </td>
            </tr>
          `).join('');
          tabelaHtml += `</tbody></table>`;
          
          adminContainer.innerHTML = tabelaHtml;
        })
        .catch(err => {
          adminContainer.innerHTML = "<p>Erro ao carregar os agendamentos. Verifique o console.</p>";
          console.error('Erro:', err);
        });
    }

    // Função para remover um agendamento
    function removerAgendamento(id) {
        fetch('/PHP/delete.php', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ id: id })
        })
        .then(res => res.json())
        .then(data => {
            if (data.status === 'success') {
                const linhaParaRemover = document.getElementById(`agendamento-${id}`);
                if (linhaParaRemover) {
                    linhaParaRemover.remove();
                }
                // Opcional: mostrar um alerta de sucesso
                // alert(data.message);
            } else {
                alert('Erro ao remover: ' + (data.error || 'Erro desconhecido'));
            }
        })
        .catch(err => console.error('Erro na remoção:', err));
    }

    // --- "OUVINTES" DE EVENTOS ---

    // Listener de cliques para os botões de EDITAR e REMOVER na tabela
    adminContainer.addEventListener('click', function(event) {
        const target = event.target;
        const id = target.dataset.id;

        if (target.classList.contains('delete-btn')) {
            if (confirm(`Tem certeza que deseja remover o agendamento ${id}?`)) {
                removerAgendamento(id);
            }
        }

        if (target.classList.contains('edit-btn')) {
            document.getElementById('edit-id').value = id;
            document.getElementById('edit-data').value = target.dataset.data;
            document.getElementById('edit-horario').value = target.dataset.horario;
            editForm.style.display = 'block';
            window.scrollTo(0, 0); // Rola a página para o topo para ver o formulário
        }
    });

    // Listener para o botão SALVAR do formulário de edição
    editForm.addEventListener('submit', function(event) {
        event.preventDefault();

        const id = document.getElementById('edit-id').value;
        const data = document.getElementById('edit-data').value;
        const horario = document.getElementById('edit-horario').value;

        fetch('/PHP/update.php', { // O nome do seu arquivo é update.php
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ id, data, horario })
        })
        .then(res => res.json())
        .then(result => {
            if (result.status === 'success') {
                alert(result.message);
                editForm.style.display = 'none';
                carregarAgendamentos(); // Recarrega a tabela com os dados atualizados
            } else {
                alert('Erro ao atualizar: ' + (result.error || 'Erro desconhecido'));
            }
        })
        .catch(err => console.error('Erro na atualização:', err));
    });

    // Listener para o botão CANCELAR do formulário de edição
    document.getElementById('cancel-edit-btn').addEventListener('click', function() {
        editForm.style.display = 'none';
    });
    
    // --- CHAMADA INICIAL ---
    // A mágica começa aqui, chamando a função para carregar tudo assim que a página abre.
    carregarAgendamentos();
  </script>
</body>
</html>
